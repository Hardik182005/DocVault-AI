version: "3.9"
services:
  backend:
    build: ./backend
    ports:
      - "8080:8080"
    env_file:
      - ./backend/.env
    environment:
      - STORAGE_DIR=/app/storage
    volumes:
      # Persist uploads, page images, ChromaDB and metadata across restarts.
      - backend_storage:/app/storage

volumes:
  backend_storage:
